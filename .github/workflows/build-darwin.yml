name: "Build nix-darwin Configuration"

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly on Fridays at 05:00 UTC
    - cron: "0 5 * * 5"

# Prevents multiple pushes from building at once, saving runner time
env:
  CACHIX_NAME: krit-nixos
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB: Build aarch64-darwin (MacBook Pro)
  # ===========================================================================
  build-darwin:
    runs-on: macos-15
    # Stay below GitHub's hard 360-minute job kill so the cachix daemon's
    # final flush still runs on a slow build.
    timeout-minutes: 350
    permissions:
      contents: read
      id-token: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            auto-optimise-store = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # Non-critical: only used to speed up this job and to push the build
      # output below. A failed install must not fail the whole job - the
      # push step is separately gated on this step's outcome.
      - name: Set up Cachix
        id: cachix_setup
        continue-on-error: true
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix profile install --accept-flake-config nixpkgs#cachix
          cachix use ${{ env.CACHIX_NAME }}

      - name: Check Flake
        run: nix flake check --impure --show-trace

      - name: Build Darwin Configuration
        id: build
        # Fail early enough that the store-cache save/push below still fits
        # inside the job budget; --keep-going maximizes what lands in the
        # cache per attempt. Only a real build failure (a genuine Nix config
        # issue) should fail this step/job - the Cachix push is a separate,
        # non-critical step below.
        timeout-minutes: 300
        run: |
          nix build .#darwinConfigurations.Krits-MacBook-Pro.system --no-link --print-out-paths --keep-going --max-jobs 2 --cores 4 > outpaths.txt

      # Non-critical secondary goal: pushing to the binary cache must never
      # fail the job on its own (e.g. the 2026-07-08 "Error: not found:
      # cachix" incident) - only the actual build above is a hard failure.
      - name: Push to Cachix (Darwin)
        id: cachix_push
        if: steps.build.outcome == 'success' && steps.cachix_setup.outcome == 'success'
        continue-on-error: true
        env:
          CACHIX_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "$CACHIX_TOKEN" ]; then
            cachix push ${{ env.CACHIX_NAME }} $(cat outpaths.txt)
          else
            echo "Skipping Cachix push: No auth token found (likely a fork)."
          fi

      - name: Check Disk Usage
        if: always()
        continue-on-error: true
        run: |
          echo "--- Disk Space Usage ---"
          df -h
          echo "--- Nix Store Size ---"
          du -sh /nix/store

      - name: Show Package Tree (Darwin)
        if: always()
        continue-on-error: true
        run: |
          OUT_PATHS=$(cat outpaths.txt)
          nix path-info -sh -r $OUT_PATHS

      - name: Notify on Failure (Darwin)
        if: failure() && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg content "🚨 nix-darwin build failed on **aarch64-darwin**! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      # Non-critical infra (cachix setup/push) failing must not fail the
      # job, but should still be surfaced - reported separately from the
      # hard-failure notice above, which only fires when the actual build
      # step failed.
      - name: Notify Non-Critical Issues (Darwin)
        if: success() && env.WEBHOOK_ID != '' && (steps.cachix_setup.outcome == 'failure' || steps.cachix_push.outcome == 'failure')
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          ISSUES=""
          if [ "${{ steps.cachix_setup.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Cachix CLI setup failed (binary cache push skipped this run)"$'\n'
          fi
          if [ "${{ steps.cachix_push.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Cachix push failed (build succeeded, but its outputs weren't cached)"$'\n'
          fi
          jq -n --arg content "⚠️ build-darwin: non-critical CI infra issue(s), job still succeeded:"$'\n'"${ISSUES}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"
