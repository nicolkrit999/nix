name: "Build NixOS Configurations, push to cachix and flake checks"
env:
  CACHIX_NAME: krit-nixos
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly on Fridays at 05:00 UTC
    - cron: "0 5 * * 5"

# Prevents multiple pushes from building at once, saving runner time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB 1: Build x86_64 Binaries (Desktop)
  # ===========================================================================
  build-x86_64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CA Certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Open permissions on /mnt
        run: sudo chmod 1777 /mnt

      - name: Maximize Nix Space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "cleave"
          witness-carnage: true
          nix-permission-edict: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            build-dir = /nix/build
            extra-platforms = aarch64-linux
            auto-optimise-store = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check Flake
        run: nix flake check --show-trace

      - name: Check for Dead Code (deadnix)
        continue-on-error: true
        run: |
          NO_COLOR=1 nix run github:astro/deadnix -- . > deadnix_report.txt || true
          if [ -s deadnix_report.txt ]; then
            echo "HAS_DEAD_CODE=true" >> $GITHUB_ENV
            echo "DEADCODE_REPORT<<EOF" >> $GITHUB_ENV
            head -n 20 deadnix_report.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "HAS_DEAD_CODE=false" >> $GITHUB_ENV
          fi

      - name: Notify Dead Code (x86_64)
        if: env.HAS_DEAD_CODE == 'true' && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg prefix "🧹 **Dead Nix Code Detected (x86_64)** Consider cleaning up:" --arg report "$DEADCODE_REPORT" '{content: ($prefix + "\n```text\n" + $report + "\n```")}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      - name: Build x86_64 Configurations
        env:
          CACHIX_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix build .#nixosConfigurations.nixos-desktop.config.system.build.toplevel --no-link --print-out-paths > outpaths.txt

          if [ -n "$CACHIX_TOKEN" ]; then
            cachix push ${{ env.CACHIX_NAME }} $(cat outpaths.txt)
          else
            echo "Skipping Cachix push: No auth token found (likely a fork)."
          fi

      - name: Check Disk Usage
        if: always()
        continue-on-error: true
        run: |
          echo "--- Disk Space Usage ---"
          df -h /nix
          echo "--- Nix Store Size ---"
          du -sh /nix/store

      - name: Show Package Tree (x86_64)
        if: always()
        continue-on-error: true
        run: |
          OUT_PATHS=$(cat outpaths.txt)
          nix path-info -sh -r $OUT_PATHS

      - name: Notify on Failure (x86_64)
        if: failure() && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg content "🚨 NixOS build failed on **x86_64**! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

  # ===========================================================================
  # JOB 2: Build AArch64 Binaries (Laptop)
  # ===========================================================================
  build-aarch64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CA Certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Open permissions on /mnt
        run: sudo chmod 1777 /mnt

      - name: Maximize Nix Space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "cleave"
          witness-carnage: true
          nix-permission-edict: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            build-dir = /nix/build
            extra-platforms = aarch64-linux
            auto-optimise-store = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Check Flake (AArch64)
        run: nix flake check --show-trace

      - name: Check for Dead Code (deadnix)
        continue-on-error: true
        run: |
          NO_COLOR=1 nix run github:astro/deadnix -- . > deadnix_report.txt || true
          if [ -s deadnix_report.txt ]; then
            echo "HAS_DEAD_CODE=true" >> $GITHUB_ENV
            echo "DEADCODE_REPORT<<EOF" >> $GITHUB_ENV
            head -n 20 deadnix_report.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "HAS_DEAD_CODE=false" >> $GITHUB_ENV
          fi

      - name: Notify Dead Code (AArch64)
        if: env.HAS_DEAD_CODE == 'true' && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg prefix "🧹 **Dead Nix Code Detected (AArch64)** Consider cleaning up:" --arg report "$DEADCODE_REPORT" '{content: ($prefix + "\n```text\n" + $report + "\n```")}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      - name: Build AArch64 Configurations
        env:
          CACHIX_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix build .#nixosConfigurations.nixos-arm-vm.config.system.build.toplevel --no-link --print-out-paths > outpaths.txt

          if [ -n "$CACHIX_TOKEN" ]; then
            cachix push ${{ env.CACHIX_NAME }} $(cat outpaths.txt)
          else
            echo "Skipping Cachix push: No auth token found (likely a fork)."
          fi

      - name: Check Disk Usage
        if: always()
        continue-on-error: true
        run: |
          echo "--- Disk Space Usage ---"
          df -h /nix
          echo "--- Nix Store Size ---"
          du -sh /nix/store

      - name: Show Package Tree (AArch64)
        if: always()
        continue-on-error: true
        run: |
          OUT_PATHS=$(cat outpaths.txt)
          nix path-info -sh -r $OUT_PATHS

      - name: Notify on Failure (AArch64)
        if: failure() && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg content "🚨 NixOS build failed on **AArch64**! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"
