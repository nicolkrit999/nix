name: "Build NixOS Configurations, push to cachix and flake checks"
env:
  CACHIX_NAME: krit-nixos
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Evaluation-only (this flake exposes no `checks` output), so it needs far
  # less time and disk than the build job and runs in parallel with it.
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      id-token: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
      CURL_HTTP_VERSION: 1.1
    steps:
      - uses: actions/checkout@v4

      - name: Install CA Certificates
        run: |
          # Best-effort freshness refresh: ca-certificates is preinstalled on
          # the runner image and Nix uses its own CA bundle (NIX_SSL_CERT_FILE),
          # so a broken third-party apt repo (packages.microsoft.com,
          # dl.google.com, ...) must never fail the job. Worst case we keep
          # the image's cert bundle - exactly what we'd have without this step.
          sudo rm -f $(grep -lr packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null) || true
          sudo apt-get update || true
          sudo apt-get install -y ca-certificates || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Add Swap
        run: |
          # GitHub-hosted runners ship with an active swap file, so fallocate
          # on /swapfile fails with "Text file busy" (ETXTBSY). Disable and
          # remove any existing swap first, then build a fresh swap file with
          # dd (the kernel-recommended method that avoids holes/ETXTBSY).
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            build-dir = /nix/build
            extra-platforms = aarch64-linux
            auto-optimise-store = true
            # Keep .drv files and build-time deps out of GC so a saved store
            # cache never has db entries pointing at pruned files (the
            # cache-nix-action-recommended guard against exactly the
            # "user-environment.drv does not exist" failure on restore).
            keep-outputs = true
            keep-derivations = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            download-attempts = 15
            http-connections = 25
            connect-timeout = 30

      # Restore only - the build job owns saving, so the two jobs never race
      # on cache writes. Non-critical: a broken/corrupted cache archive must
      # not fail this job, just slow it down to a cold build.
      - name: Restore Nix Store Cache
        id: cache_restore
        continue-on-error: true
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
            nix-${{ runner.os }}-

      - name: Verify Restored Store
        run: |
          # A restored cache can carry db registrations whose files never
          # made it into the archive (snapshot of a killed build - bit us on
          # 2026-07-07 as "user-environment.drv does not exist" in cachix's
          # nix-env install). nix-store --verify drops such phantom entries
          # so later nix commands rebuild them instead of crashing.
          # Best-effort: verify being unavailable must not fail the job.
          sudo -i nix-store --verify || sudo /nix/var/nix/profiles/default/bin/nix-store --verify || true

      # Non-critical: only used to speed up this job via the binary cache
      # substituter. A failed install must not fail the flake check.
      - name: Set up Cachix
        id: cachix_setup
        continue-on-error: true
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix profile install --accept-flake-config nixpkgs#cachix
          cachix use ${{ env.CACHIX_NAME }}

      - name: Check Flake
        run: nix flake check --all-systems --show-trace

      - name: Check for Dead Code (deadnix)
        continue-on-error: true
        run: |
          NO_COLOR=1 nix run --inputs-from . nixpkgs#deadnix -- . > deadnix_report.txt || true
          if [ -s deadnix_report.txt ]; then
            echo "HAS_DEAD_CODE=true" >> $GITHUB_ENV
            echo "DEADCODE_REPORT<<EOF" >> $GITHUB_ENV
            head -n 20 deadnix_report.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "HAS_DEAD_CODE=false" >> $GITHUB_ENV
          fi

      - name: Notify Dead Code (x86_64)
        if: env.HAS_DEAD_CODE == 'true' && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg prefix "🧹 **Dead Nix Code Detected (x86_64)** Consider cleaning up:" --arg report "$DEADCODE_REPORT" '{content: ($prefix + "\n```text\n" + $report + "\n```")}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      - name: Notify on Failure (flake check)
        if: failure() && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg content "🚨 Flake check failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      # Non-critical infra (store cache / cachix) failing must not fail the
      # job, but should still be surfaced - this reports it separately from
      # the hard-failure notice above, which only fires for real flake-check
      # breakage.
      - name: Notify Non-Critical Issues (flake-check)
        if: success() && env.WEBHOOK_ID != '' && (steps.cache_restore.outcome == 'failure' || steps.cachix_setup.outcome == 'failure')
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          ISSUES=""
          if [ "${{ steps.cache_restore.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Nix store cache restore failed (this run built cold, no functional impact)"$'\n'
          fi
          if [ "${{ steps.cachix_setup.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Cachix CLI setup failed (no binary-cache substituter this run, no functional impact)"$'\n'
          fi
          jq -n --arg content "⚠️ flake-check: non-critical CI infra issue(s), job still succeeded:"$'\n'"${ISSUES}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

  build-x86_64:
    runs-on: ubuntu-latest
    # Stay below GitHub's hard 360-minute job kill: a hard-killed job loses
    # its cache-save and cachix-flush steps, which is why retries used to
    # restart from zero.
    timeout-minutes: 350
    permissions:
      contents: read
      id-token: write
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
      CURL_HTTP_VERSION: 1.1
    steps:
      - uses: actions/checkout@v4

      - name: Install CA Certificates
        run: |
          # Best-effort freshness refresh: ca-certificates is preinstalled on
          # the runner image and Nix uses its own CA bundle (NIX_SSL_CERT_FILE),
          # so a broken third-party apt repo (packages.microsoft.com,
          # dl.google.com, ...) must never fail the job. Worst case we keep
          # the image's cert bundle - exactly what we'd have without this step.
          sudo rm -f $(grep -lr packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null) || true
          sudo apt-get update || true
          sudo apt-get install -y ca-certificates || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Open permissions on /mnt
        run: sudo chmod 1777 /mnt

      - name: Add Swap
        run: |
          # GitHub-hosted runners ship with an active swap file, so fallocate
          # on /swapfile fails with "Text file busy" (ETXTBSY). Disable and
          # remove any existing swap first, then build a fresh swap file with
          # dd (the kernel-recommended method that avoids holes/ETXTBSY).
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Maximize Nix Space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "cleave"
          witness-carnage: true
          nix-permission-edict: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            build-dir = /nix/build
            extra-platforms = aarch64-linux
            auto-optimise-store = true
            # Keep .drv files and build-time deps out of GC so a saved store
            # cache never has db entries pointing at pruned files (the
            # cache-nix-action-recommended guard against exactly the
            # "user-environment.drv does not exist" failure on restore).
            keep-outputs = true
            keep-derivations = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            download-attempts = 15
            http-connections = 25
            connect-timeout = 30

      # The run_id/run_attempt suffix makes every attempt save a fresh cache:
      # a key that is only the flake.lock hash can never be updated once it
      # exists, so a first failed attempt would freeze its partial store
      # forever. Restoration walks the prefixes newest-first instead.
      - name: Restore Nix Store Cache
        id: cache_restore
        continue-on-error: true
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
            nix-${{ runner.os }}-

      - name: Verify Restored Store
        run: |
          # A restored cache can carry db registrations whose files never
          # made it into the archive (snapshot of a killed build - bit us on
          # 2026-07-07 as "user-environment.drv does not exist" in cachix's
          # nix-env install). This job's timeout-killed builds still save
          # caches on purpose (retry-resume), so heal at restore time:
          # nix-store --verify drops phantom db entries so later nix
          # commands rebuild them instead of crashing.
          # Best-effort: verify being unavailable must not fail the job.
          sudo -i nix-store --verify || sudo /nix/var/nix/profiles/default/bin/nix-store --verify || true

      # Non-critical: only used to speed up this job and to push the build
      # output below. A failed install must not fail the whole job - the
      # push step is separately gated on this step's outcome.
      - name: Set up Cachix
        id: cachix_setup
        continue-on-error: true
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix profile install --accept-flake-config nixpkgs#cachix
          cachix use ${{ env.CACHIX_NAME }}

      - name: Build x86_64 Configurations
        id: build
        # Fail this step early enough that the store-cache save below still
        # fits inside the job budget; --keep-going maximizes how much of the
        # closure lands in the cache per attempt. Only a real build failure
        # (a genuine Nix config issue) should fail this step/job - the
        # Cachix push is a separate, non-critical step below.
        timeout-minutes: 270
        run: |
          nix build .#nixosConfigurations.nixos-desktop.config.system.build.toplevel --no-link --print-out-paths --keep-going --max-jobs 2 --cores 4 > outpaths.txt

      # Non-critical secondary goal: pushing to the binary cache must never
      # fail the job on its own (e.g. the 2026-07-08 "Error: not found:
      # cachix" incident) - only the actual build above is a hard failure.
      - name: Push to Cachix (x86_64)
        id: cachix_push
        if: steps.build.outcome == 'success' && steps.cachix_setup.outcome == 'success'
        continue-on-error: true
        env:
          CACHIX_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "$CACHIX_TOKEN" ]; then
            cachix push ${{ env.CACHIX_NAME }} $(cat outpaths.txt)
          else
            echo "Skipping Cachix push: No auth token found (likely a fork)."
          fi

      - name: Check Disk Usage
        if: always()
        continue-on-error: true
        run: |
          echo "--- Disk Space Usage ---"
          df -h /nix
          echo "--- Nix Store Size ---"
          du -sh /nix/store
          echo "--- Swap ---"
          free -h

      - name: Show Package Tree (x86_64)
        continue-on-error: true
        run: |
          OUT_PATHS=$(cat outpaths.txt)
          nix path-info -sh -r $OUT_PATHS

      # Runs even when the build step failed or timed out, so partially built
      # derivations survive into the next attempt instead of rebuilding from
      # scratch every retry. NOT always(): a cancelled run (concurrency,
      # manual) snapshots a store whose db references paths the tar never
      # captures - restoring such a cache broke cachix's nix-env install
      # ("user-environment.drv does not exist", 2026-07-07). Skipping when
      # the build step never ran also stops early-failure runs from saving
      # a near-empty store that would shadow the good caches on restore
      # (restore picks the newest prefix match).
      - name: Save Nix Store Cache
        id: cache_save
        if: (success() || failure()) && steps.build.outcome != 'skipped'
        continue-on-error: true
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          gc-max-store-size-linux: 7000000000
          # Deliberately NO purge-* options. Purging needs an `actions: write`
          # permission this job doesn't grant, so they were always a silent
          # no-op - and actually granting it with purge-created: 0 would have
          # deleted every good cache on each save, leaving only this run's
          # (possibly broken) one. GitHub's 10 GB per-repo LRU eviction
          # handles cleanup on its own.

      - name: Notify on Failure (x86_64)
        if: failure() && env.WEBHOOK_ID != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          jq -n --arg content "🚨 NixOS build failed on **x86_64**! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"

      # Non-critical infra (store cache restore/save, cachix setup/push)
      # failing must not fail the job, but should still be surfaced -
      # reported separately from the hard-failure notice above, which only
      # fires when the actual build step failed.
      - name: Notify Non-Critical Issues (x86_64)
        if: success() && env.WEBHOOK_ID != '' && (steps.cache_restore.outcome == 'failure' || steps.cachix_setup.outcome == 'failure' || steps.cachix_push.outcome == 'failure' || steps.cache_save.outcome == 'failure')
        continue-on-error: true
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          ISSUES=""
          if [ "${{ steps.cache_restore.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Nix store cache restore failed (this run built cold, no functional impact)"$'\n'
          fi
          if [ "${{ steps.cachix_setup.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Cachix CLI setup failed (binary cache push skipped this run)"$'\n'
          fi
          if [ "${{ steps.cachix_push.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Cachix push failed (build succeeded, but its outputs weren't cached)"$'\n'
          fi
          if [ "${{ steps.cache_save.outcome }}" == "failure" ]; then
            ISSUES="${ISSUES}- Nix store cache save failed (no retry-resume cache for next run)"$'\n'
          fi
          jq -n --arg content "⚠️ build-x86_64: non-critical CI infra issue(s), job still succeeded:"$'\n'"${ISSUES}Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $content}' > payload.json
          curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"
