name: "NixOS Tests"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-nixos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NIXPKGS_ALLOW_UNFREE: 1
      WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
      CURL_HTTP_VERSION: 1.1
      FLAKE_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CA Certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Open permissions on /mnt
        run: sudo chmod 1777 /mnt

      - name: Maximize Nix Space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "cleave"
          witness-carnage: true
          nix-permission-edict: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
          extra-conf: |
            build-dir = /nix/build
            extra-platforms = aarch64-linux
            auto-optimise-store = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            download-attempts = 15
            http-connections = 25
            connect-timeout = 30
            extra-substituters = https://catppuccin.cachix.org https://krit-nixos.cachix.org
            extra-trusted-public-keys = catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732n/9sI= krit-nixos.cachix.org-1:54bU6/gPbvP4X+nu2apEx343noMoo3Jln8LzYfKD7ks=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 7000000000
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never

      - name: "Test: minimal-defaults"
        id: minimal-defaults
        continue-on-error: true
        run: bash templates/tests/nixos/test-minimal-defaults/check-nixos-minimal-defaults.sh

      - name: "Test: spec-contract"
        id: spec-contract
        continue-on-error: true
        run: bash templates/tests/nixos/test-spec-contract/check-nixos-spec-contract.sh

      - name: "Test: conflicting-modules"
        id: conflicting-modules
        continue-on-error: true
        run: nix run github:danielefongo/nix-tests -- templates/tests/nixos/conflicting-modules

      - name: "Test: custom-shells"
        id: custom-shells
        continue-on-error: true
        run: nix run github:danielefongo/nix-tests -- templates/tests/nixos/test-custom-shells

      - name: "Test: arch-compat (aarch64)"
        id: arch-compat
        continue-on-error: true
        run: bash templates/tests/nixos/test-arch-compat/check-nixos-aarch64-compat.sh

      - name: Summary and notify on failure
        if: always()
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/${{ secrets.DISCORD_WEBHOOK_ID }}/${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MINIMAL_OUTCOME: ${{ steps.minimal-defaults.outcome }}
          SPEC_OUTCOME: ${{ steps.spec-contract.outcome }}
          CONFLICT_OUTCOME: ${{ steps.conflicting-modules.outcome }}
          SHELLS_OUTCOME: ${{ steps.custom-shells.outcome }}
          ARCH_OUTCOME: ${{ steps.arch-compat.outcome }}
        run: |

          FAILED=()

          [[ "$MINIMAL_OUTCOME" != "success" ]] && FAILED+=("✗  minimal-defaults")
          [[ "$SPEC_OUTCOME"    != "success" ]] && FAILED+=("✗  spec-contract")
          [[ "$CONFLICT_OUTCOME" != "success" ]] && FAILED+=("✗  conflicting-modules")
          [[ "$SHELLS_OUTCOME"  != "success" ]] && FAILED+=("✗  custom-shells")
          [[ "$ARCH_OUTCOME"    != "success" ]] && FAILED+=("✗  arch-compat (aarch64)")

          if [[ ${#FAILED[@]} -eq 0 ]]; then
            echo "All NixOS tests passed."
            exit 0
          fi

          echo "Failed tests: ${FAILED[*]}"

          if [[ -n "$WEBHOOK_ID" ]]; then
            REPORT=$(printf '%s\n' "${FAILED[@]}")
            jq -n \
              --arg report "$REPORT" \
              --arg ref "$REF_NAME" \
              --arg event "$EVENT_NAME" \
              --arg url "$RUN_URL" \
              '{content: "🧪 **NixOS Tests Failed** | `\($ref)` (\($event))\n```\n\($report)\n```\n🔗 \($url)"}' \
              > payload.json
            curl -s -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"
          fi

          exit 1
